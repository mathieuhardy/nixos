hwdec=vaapi

# General settings
keep-open=yes
save-position-on-quit=yes
resume-playback=yes
resume-playback-check-mtime=no

# Language settings
alang='eng,en'
slang='eng,en'

# Video settings
vo=gpu-next
gpu-context=wayland
target-colorspace-hint=yes
video-output-levels=full

# Audio settings
volume=80
volume-max=100

# Keybindings
input-builtin-bindings=no
